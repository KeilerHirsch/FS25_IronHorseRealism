<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Iron Horse Realism for FS25: a modular vehicle-realism framework. engineStall is live (released); engineHealth, drivetrain, tyres, electrical, visualDirt and toolbox are built on the backbone with their cockpit readouts, physics/consequence tuning in progress. One cockpit HUD colours each system by severity.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111c2e"/>
      <stop offset="1" stop-color="#0b1322"/>
    </linearGradient>
    <linearGradient id="hudPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161207"/>
      <stop offset="1" stop-color="#0d0f16"/>
    </linearGradient>
    <linearGradient id="chain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" rx="26" fill="url(#bg)"/>

  <!-- Header -->
  <text x="64" y="60" fill="#ffa61a" font-size="20" font-weight="700" letter-spacing="3">FS25 &#183; VEHICLE-REALISM FRAMEWORK</text>
  <text x="64" y="112" fill="#f1f5f9" font-size="42" font-weight="800">Iron Horse Realism</text>
  <text x="64" y="146" fill="#94a3b8" font-size="19">Seven modules. <tspan fill="#cbd5e1" font-weight="600">One drivetrain chain. One HUD.</tspan> Engine, drive, tyres, electrics, dirt &amp; field-repair &#8212; from scratch.</text>

  <!-- ============ LEFT: the module chain ============ -->
  <rect x="64" y="184" width="662" height="392" rx="18" fill="url(#panel)" stroke="#334155" stroke-width="1.5"/>
  <rect x="64" y="184" width="662" height="6" rx="3" fill="#ffa61a"/>
  <text x="90" y="224" fill="#e2e8f0" font-size="17" font-weight="700" letter-spacing="2">THE REALISM CHAIN &#8212; MODULE BY MODULE</text>

  <!-- flow spine: green (released) -> cyan (built on the backbone) -->
  <rect x="103" y="250" width="4" height="300" rx="2" fill="url(#chain)"/>

  <!-- rows -->
  <g font-size="17">
    <!-- engineStall LIVE -->
    <circle cx="105" cy="268" r="9" fill="#22c55e"/>
    <path d="M100 268 l4 4 l7 -8" fill="none" stroke="#0b1322" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="264" fill="#f1f5f9" font-weight="700">engineStall</text>
    <text x="128" y="285" fill="#94a3b8" font-size="14.5">soft-stall: the engine labours, then dies under overload</text>
    <rect x="600" y="252" width="102" height="26" rx="13" fill="#22c55e" fill-opacity="0.16"/>
    <text x="651" y="269" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">LIVE</text>

    <!-- engineHealth BUILT -->
    <circle cx="105" cy="311" r="9" fill="#38bdf8"/>
    <path d="M100 311 l4 4 l7 -8" fill="none" stroke="#0b1322" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="307" fill="#f1f5f9" font-weight="700">engineHealth</text>
    <text x="128" y="328" fill="#94a3b8" font-size="14.5">wear &amp; temperature: overheat, cold-shock, engine condition</text>
    <rect x="600" y="295" width="102" height="26" rx="13" fill="#38bdf8" fill-opacity="0.16"/>
    <text x="651" y="312" fill="#7dd3fc" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">BUILT</text>

    <!-- drivetrain BUILT -->
    <circle cx="105" cy="354" r="9" fill="#38bdf8"/>
    <path d="M100 354 l4 4 l7 -8" fill="none" stroke="#0b1322" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="350" fill="#f1f5f9" font-weight="700">drivetrain</text>
    <text x="128" y="371" fill="#94a3b8" font-size="14.5">diff locks &amp; power delivery to the wheels</text>
    <rect x="600" y="338" width="102" height="26" rx="13" fill="#38bdf8" fill-opacity="0.16"/>
    <text x="651" y="355" fill="#7dd3fc" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">BUILT</text>

    <!-- tyres BUILT -->
    <circle cx="105" cy="397" r="9" fill="#38bdf8"/>
    <path d="M100 397 l4 4 l7 -8" fill="none" stroke="#0b1322" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="393" fill="#f1f5f9" font-weight="700">tyres</text>
    <text x="128" y="414" fill="#94a3b8" font-size="14.5">pressure &#8594; traction &amp; contact patch</text>
    <rect x="600" y="381" width="102" height="26" rx="13" fill="#38bdf8" fill-opacity="0.16"/>
    <text x="651" y="398" fill="#7dd3fc" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">BUILT</text>

    <!-- electrical BUILT -->
    <circle cx="105" cy="440" r="9" fill="#38bdf8"/>
    <path d="M100 440 l4 4 l7 -8" fill="none" stroke="#0b1322" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="436" fill="#f1f5f9" font-weight="700">electrical</text>
    <text x="128" y="457" fill="#94a3b8" font-size="14.5">battery &amp; alternator on real Ah / V data</text>
    <rect x="600" y="424" width="102" height="26" rx="13" fill="#38bdf8" fill-opacity="0.16"/>
    <text x="651" y="441" fill="#7dd3fc" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">BUILT</text>

    <!-- visualDirt BUILT -->
    <circle cx="105" cy="483" r="9" fill="#38bdf8"/>
    <path d="M100 483 l4 4 l7 -8" fill="none" stroke="#0b1322" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="479" fill="#f1f5f9" font-weight="700">visualDirt</text>
    <text x="128" y="500" fill="#94a3b8" font-size="14.5">mud, dust &amp; dirt build-up</text>
    <rect x="600" y="467" width="102" height="26" rx="13" fill="#38bdf8" fill-opacity="0.16"/>
    <text x="651" y="484" fill="#7dd3fc" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">BUILT</text>

    <!-- toolbox BUILT -->
    <circle cx="105" cy="526" r="9" fill="#38bdf8"/>
    <path d="M100 526 l4 4 l7 -8" fill="none" stroke="#0b1322" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="128" y="522" fill="#f1f5f9" font-weight="700">toolbox</text>
    <text x="128" y="543" fill="#94a3b8" font-size="14.5">field repair to limp a dead machine home</text>
    <rect x="600" y="510" width="102" height="26" rx="13" fill="#38bdf8" fill-opacity="0.16"/>
    <text x="651" y="527" fill="#7dd3fc" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">BUILT</text>
  </g>

  <!-- ============ RIGHT: one cockpit HUD ============ -->
  <rect x="750" y="184" width="466" height="392" rx="18" fill="url(#hudPanel)" stroke="#3f3320" stroke-width="1.5"/>
  <rect x="750" y="184" width="466" height="6" rx="3" fill="#ffa61a"/>
  <text x="776" y="224" fill="#e2e8f0" font-size="17" font-weight="700" letter-spacing="2">IN THE CAB &#8212; ONE HUD</text>
  <text x="776" y="248" fill="#94a3b8" font-size="14.5">Every module lights its own tell-tale, coloured by severity.</text>

  <!-- speed gauge -->
  <circle cx="1140" cy="330" r="52" fill="#0b0f16" stroke="#3f3320" stroke-width="2"/>
  <path d="M1140 330 m-40,0 a40,40 0 1,1 80,0" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
  <path d="M1140 330 m-40,0 a40,40 0 0,1 34,-21" fill="none" stroke="#ffa61a" stroke-width="4" stroke-linecap="round"/>
  <text x="1140" y="326" fill="#f1f5f9" font-size="22" font-weight="800" text-anchor="middle">14</text>
  <text x="1140" y="346" fill="#64748b" font-size="11" text-anchor="middle" letter-spacing="1">km/h</text>

  <!-- cluster chips (the real severity colours) -->
  <g>
    <!-- MOTOR critical -->
    <rect x="776" y="284" width="266" height="34" rx="7" fill="#ff4d40" fill-opacity="0.14" stroke="#ff4d40" stroke-opacity="0.5" stroke-width="1"/>
    <text x="792" y="306" fill="#ff6a5e" font-size="15" font-weight="700">MOTOR<tspan fill="#ff8a80" font-weight="600" dx="8">92%</tspan><tspan fill="#ffb3ac" font-weight="600" dx="8">qu&#228;lt sich</tspan></text>

    <!-- TEMP warning -->
    <rect x="776" y="324" width="266" height="34" rx="7" fill="#ffa61a" fill-opacity="0.13" stroke="#ffa61a" stroke-opacity="0.5" stroke-width="1"/>
    <text x="792" y="346" fill="#ffbf55" font-size="15" font-weight="700">TEMP<tspan fill="#ffd58a" font-weight="600" dx="8">96&#176;C</tspan></text>

    <!-- DIFF V info -->
    <rect x="776" y="364" width="266" height="34" rx="7" fill="#f1f5f9" fill-opacity="0.06" stroke="#f1f5f9" stroke-opacity="0.22" stroke-width="1"/>
    <text x="792" y="386" fill="#e2e8f0" font-size="15" font-weight="700">DIFF V<tspan fill="#cbd5e1" font-weight="600" dx="8">SPERR</tspan></text>

    <!-- SCHADEN warning -->
    <rect x="776" y="404" width="266" height="34" rx="7" fill="#ffa61a" fill-opacity="0.13" stroke="#ffa61a" stroke-opacity="0.5" stroke-width="1"/>
    <text x="792" y="426" fill="#ffbf55" font-size="15" font-weight="700">SCHADEN<tspan fill="#ffd58a" font-weight="600" dx="8">61%</tspan><tspan fill="#ffd58a" font-weight="600" dx="8">Feldrep.</tspan></text>
  </g>

  <!-- severity legend -->
  <text x="776" y="470" fill="#64748b" font-size="13" font-weight="700" letter-spacing="1.5">SEVERITY</text>
  <g font-size="14">
    <circle cx="784" cy="497" r="7" fill="#73b8ff"/><text x="799" y="502" fill="#94a3b8">kalt</text>
    <circle cx="862" cy="497" r="7" fill="#f1f5f9"/><text x="877" y="502" fill="#94a3b8">normal</text>
    <circle cx="962" cy="497" r="7" fill="#ffa61a"/><text x="977" y="502" fill="#94a3b8">Warnung</text>
    <circle cx="1088" cy="497" r="7" fill="#ff4d40"/><text x="1103" y="502" fill="#94a3b8">kritisch</text>
  </g>
  <text x="776" y="544" fill="#748094" font-size="13.5">Server-authoritative &#183; syncs clean to every dedicated-server client.</text>

  <!-- ============ Footer strip ============ -->
  <rect x="64" y="596" width="1152" height="34" rx="10" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <text x="88" y="618" fill="#cbd5e1" font-size="14.5">
    <tspan font-weight="700" fill="#ffa61a">Replaces</tspan> AdvancedDamageSystem &#183; EnhancedVehicle &#183; VariableTirePressure &#8212; one coherent chain on real data  &#183;  multiplayer-safe  &#183;  GPLv3  &#183;  KeilerHirsch
  </text>
</svg>
